<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>А2 — Поиск шин</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Segoe UI',sans-serif;background:#0d1117;color:#c9d1d9;min-height:100vh;font-size:14px}

/* Login screen */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.login-box{background:#161b22;border:1px solid #30363d;border-radius:14px;padding:36px 32px;width:100%;max-width:340px;text-align:center}
.login-logo{font-size:28px;font-weight:700;color:#58a6ff;margin-bottom:6px}
.login-sub{font-size:13px;color:#8b949e;margin-bottom:28px}
.login-inp{width:100%;background:#0d1117;border:1px solid #30363d;border-radius:8px;color:#c9d1d9;padding:12px 16px;font-size:15px;outline:none;text-align:center;letter-spacing:3px;margin-bottom:12px}
.login-inp:focus{border-color:#58a6ff}
.login-inp::placeholder{letter-spacing:0;color:#484f58}
.login-btn{width:100%;background:#238636;color:#fff;border:none;border-radius:8px;padding:13px;font-size:15px;font-weight:600;cursor:pointer}
.login-btn:hover{background:#2ea043}
.login-err{color:#f85149;font-size:12px;margin-top:10px;min-height:18px}

/* Main app */
.app{display:none}
.hdr{background:#161b22;border-bottom:1px solid #30363d;padding:12px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
.logo{font-size:16px;font-weight:700;color:#58a6ff;white-space:nowrap}
.hdr-meta{font-size:11px;color:#8b949e;margin-left:auto;text-align:right;line-height:1.5}
.hdr-meta span{color:#3fb950}

.search-area{background:#161b22;border-bottom:1px solid #30363d;padding:10px 16px;position:sticky;top:49px;z-index:99}
.inp{background:#0d1117;border:1px solid #30363d;border-radius:8px;color:#c9d1d9;padding:10px 14px;font-size:14px;outline:none;width:100%;margin-bottom:8px}
.inp:focus{border-color:#58a6ff}
.inp::placeholder{color:#484f58}

.filters{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.pill{display:flex;align-items:center;gap:4px;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid #30363d;background:#0d1117;color:#8b949e;cursor:pointer;white-space:nowrap;user-select:none}
.pill.active{background:#1f3a5f;border-color:#388bfd;color:#79c0ff}

.stats{font-size:11px;color:#8b949e;padding:8px 16px 4px;border-bottom:1px solid #21262d}
.stats b{color:#58a6ff}

.row-item{display:flex;flex-direction:column;gap:3px;padding:10px 16px;border-bottom:1px solid #21262d;cursor:pointer}
.row-item:active{background:#161b22}
.row-top{display:flex;align-items:center;gap:8px}
.seas-icon{font-size:16px;flex-shrink:0;width:22px;text-align:center}
.nom-text{font-size:13px;font-weight:500;color:#e6edf3;line-height:1.3;flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.row-mid{display:flex;align-items:center;gap:8px;padding-left:30px}
.size-badge{font-size:11px;font-weight:600;color:#79c0ff;background:#0d2a4a;padding:2px 8px;border-radius:4px;white-space:nowrap}
.brand-txt{font-size:11px;color:#8b949e}
.inis-txt{font-size:11px;color:#6e7681}
.row-bot{display:flex;align-items:center;padding-left:30px}
.sup-tags{display:flex;gap:4px;flex:1;overflow:hidden}
.sup-tag{font-size:11px;padding:2px 7px;border-radius:4px;white-space:nowrap;border:1px solid}
.s-a2c{color:#3fb950;border-color:#238636;background:#0d2a1a}
.s-aikos{color:#d29922;border-color:#9e6a03;background:#1c1300}
.s-caspian{color:#79c0ff;border-color:#388bfd;background:#0d1f3a}
.s-zafco{color:#c084fc;border-color:#7c3aed;background:#1a0d2a}
.s-rema{color:#f0883e;border-color:#bd561d;background:#2d1000}
.s-tdk{color:#58a6ff;border-color:#1f6feb;background:#0d2040}
.s-san{color:#48d483;border-color:#2ea043;background:#0a2010}
.s-freedom{color:#ff7b72;border-color:#da3633;background:#2d1010}
.s-adak{color:#e3b341;border-color:#9e6a03;background:#1f1700}
.s-cbc{color:#8b949e;border-color:#30363d;background:#161b22}
.qty-tag{font-size:11px;font-weight:600;margin-left:auto;white-space:nowrap;padding-left:8px}
.qty-ok{color:#3fb950}.qty-low{color:#d29922}.qty-zero{color:#484f58}
.price-txt{font-size:11px;color:#6e7681;margin-left:6px;white-space:nowrap}

.detail{display:none;background:#161b22;border-top:1px solid #21262d;padding:10px 16px 10px 46px}
.detail.open{display:block}
.detail-sups{display:flex;flex-direction:column;gap:4px}
.detail-sup{display:flex;justify-content:space-between;align-items:center;font-size:12px;padding:7px 10px;border-radius:7px;background:#0d1117;border:1px solid #21262d}
.ds-left{display:flex;align-items:center;gap:6px;overflow:hidden}
.ds-addr{color:#8b949e;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ds-right{display:flex;align-items:center;gap:10px;flex-shrink:0;margin-left:8px}
.ds-qty{font-weight:600}
.ds-price{color:#8b949e;font-size:11px}
.ds-kaspi{color:#3fb950;font-size:11px}

.loading{text-align:center;padding:60px 20px;color:#484f58}
.empty{text-align:center;padding:60px 20px;color:#484f58}
.spinner{display:inline-block;width:28px;height:28px;border:3px solid #21262d;border-top-color:#58a6ff;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- Экран входа -->
<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <div class="login-logo">А2 Шины</div>
    <div class="login-sub">Введите пароль для доступа</div>
    <input class="login-inp" id="pwdInp" type="password" placeholder="Пароль"
           onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">Войти</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- Основное приложение -->
<div class="app" id="app">
  <div class="hdr">
    <div class="logo">А2 Шины</div>
    <div class="hdr-meta" id="meta">Загрузка...</div>
  </div>
  <div class="search-area">
    <input class="inp" id="q" placeholder="🔍  Размер, бренд, модель..." oninput="search()">
    <div class="filters">
      <div class="pill active" data-seas="" onclick="setSeas(this)">Все</div>
      <div class="pill" data-seas="лето" onclick="setSeas(this)">☀️ Лето</div>
      <div class="pill" data-seas="зима" onclick="setSeas(this)">❄️ Зима</div>
      <div class="pill" data-seas="ШИП" onclick="setSeas(this)">🔩 Шип</div>
      <div class="pill" data-seas="ВС" onclick="setSeas(this)">🌤 ВС</div>
      <div class="pill" data-avail="1" onclick="toggleAvail(this)">✓ В наличии</div>
    </div>
  </div>
  <div class="stats" id="stats" style="display:none"></div>
  <div id="results"><div class="loading"><div class="spinner"></div><br>Загрузка данных...</div></div>
</div>

<script>
// ═══════════════════════════════════════════
// ПАРОЛЬ — измените на свой
const PASSWORD = "Abdeldinov22";
// ═══════════════════════════════════════════

const SEAS_ICON={лето:'☀️',зима:'❄️','ШИП':'🔩','ВС':'🌤'};
const SUP_CLS={
  'A2C':'s-a2c','Aikos':'s-aikos','Caspian':'s-caspian','ZAFCO':'s-zafco',
  'KAZ-Rema':'s-rema','TDK':'s-tdk','SAN':'s-san','Freedom':'s-freedom',
  'ADAK':'s-adak','CBC':'s-cbc'
};

let ALL=[], filterSeas='', filterAvail=false, openIdx=-1;

// Проверяем сохранённый пароль
if(sessionStorage.getItem('a2auth')===PASSWORD){
  showApp();
}

function doLogin(){
  const val=document.getElementById('pwdInp').value;
  if(val===PASSWORD){
    sessionStorage.setItem('a2auth',val);
    showApp();
  } else {
    const err=document.getElementById('loginErr');
    err.textContent='Неверный пароль';
    document.getElementById('pwdInp').value='';
    setTimeout(()=>err.textContent='',2000);
  }
}

function showApp(){
  document.getElementById('loginWrap').style.display='none';
  document.getElementById('app').style.display='block';
  loadData();
}

function qtyNum(v){const m=String(v||0).match(/\d+/);return m?parseInt(m[0]):0;}
function fmt(v){return v?Number(v).toLocaleString('ru-RU')+'₸':'—';}
function clean(v){const s=String(v||'').trim();return s&&s!=='nan'&&s!=='null'?s:'';}

function loadData(){
  fetch('masterfile_data.json?v='+Date.now())
    .then(r=>r.json())
    .then(data=>{
      ALL=data.items||[];
      document.getElementById('meta').innerHTML=
        `Обн: <span>${data.updated||''}</span><br>${ALL.length} позиций`;
      search();
    })
    .catch(()=>{
      document.getElementById('results').innerHTML=
        '<div class="empty">⚠️ Данные не найдены.<br>Запустите обновление мастерфайла.</div>';
    });
}

function setSeas(el){
  document.querySelectorAll('[data-seas]').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  filterSeas=el.dataset.seas;
  search();
}
function toggleAvail(el){
  filterAvail=!filterAvail;
  el.classList.toggle('active',filterAvail);
  search();
}

function search(){
  const q=(document.getElementById('q').value||'').toLowerCase().trim();
  let res=ALL.filter(r=>{
    if(filterSeas&&r.season!==filterSeas) return false;
    if(filterAvail&&!r.suppliers.some(s=>qtyNum(s.qty)>0)) return false;
    if(q){
      const hay=[r.nom,r.brand,r.size,r.inis,r.model].join(' ').toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });

  const st=document.getElementById('stats');
  st.style.display='';
  st.innerHTML=`Найдено: <b>${res.length}</b> позиций`;

  const el=document.getElementById('results');
  el.innerHTML=''; openIdx=-1;
  if(!res.length){el.innerHTML='<div class="empty">Ничего не найдено</div>';return;}

  const toShow=res.slice(0,300);
  const frag=document.createDocumentFragment();

  toShow.forEach((r,i)=>{
    const sups=r.suppliers||[];
    const totalQty=sups.reduce((a,s)=>a+qtyNum(s.qty),0);
    const prices=sups.filter(s=>s.price).map(s=>s.price);
    const minPrice=prices.length?Math.min(...prices):null;
    const qcls=totalQty===0?'qty-zero':totalQty<=3?'qty-low':'qty-ok';
    const icon=SEAS_ICON[r.season]||'🔘';
    const uniqueSups=[...new Set(sups.map(s=>s.sup))];
    const supTags=uniqueSups.map(s=>`<span class="sup-tag ${SUP_CLS[s]||'s-cbc'}">${s}</span>`).join('');

    const wrap=document.createElement('div');
    wrap.innerHTML=`
      <div class="row-item" onclick="toggleDetail(${i})">
        <div class="row-top">
          <span class="seas-icon">${icon}</span>
          <span class="nom-text">${r.nom}</span>
        </div>
        <div class="row-mid">
          ${r.size?`<span class="size-badge">${r.size}</span>`:''}
          ${r.brand?`<span class="brand-txt">${r.brand}</span>`:''}
          ${r.inis?`<span class="inis-txt">${r.inis}</span>`:''}
        </div>
        <div class="row-bot">
          <div class="sup-tags">${supTags}</div>
          <span class="qty-tag ${qcls}">${totalQty>0?totalQty+'шт':'нет'}</span>
          ${minPrice?`<span class="price-txt">от ${fmt(minPrice)}</span>`:''}
        </div>
      </div>
      <div class="detail" id="d${i}">
        <div class="detail-sups">
          ${sups.map(s=>{
            const qn=qtyNum(s.qty);
            const qc=qn===0?'qty-zero':qn<=3?'qty-low':'qty-ok';
            return `<div class="detail-sup">
              <div class="ds-left">
                <span class="sup-tag ${SUP_CLS[s.sup]||'s-cbc'}">${s.sup}</span>
                <span class="ds-addr">${clean(s.addr)||'—'}</span>
              </div>
              <div class="ds-right">
                <span class="ds-qty ${qc}">${s.qty||'0'}</span>
                ${s.price?`<span class="ds-price">${fmt(s.price)}</span>`:''}
                ${s.kaspi?`<span class="ds-kaspi">Каспи: ${fmt(s.kaspi)}</span>`:''}
              </div>
            </div>`;
          }).join('')}
        </div>
      </div>`;
    frag.appendChild(wrap);
  });

  el.appendChild(frag);
  if(res.length>300){
    const more=document.createElement('div');
    more.style.cssText='text-align:center;padding:16px;color:#8b949e;font-size:12px';
    more.textContent=`Показано 300 из ${res.length}. Уточните запрос.`;
    el.appendChild(more);
  }
}

function toggleDetail(i){
  const d=document.getElementById('d'+i);
  if(!d) return;
  if(openIdx===i){d.classList.remove('open');openIdx=-1;return;}
  if(openIdx>=0){const p=document.getElementById('d'+openIdx);if(p)p.classList.remove('open');}
  d.classList.add('open');openIdx=i;
}
</script>
</body>
</html>
